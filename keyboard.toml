# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "Hydrate Keyboard"
product_name = "Hydrate Keyboard"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "Hydrate_W"
# board = "nice!nano_v2"
chip = "nrf52840"
usb_enable = true

[split]
connection = "ble"

[storage]
enabled = true
clear_storage = false

[layout]
rows = 4
cols = 12
layers = 5
matrix_map = """
(0,0,L) (0,1,L) (0,2,L) (0,3,L) (0,4,L) (0,5,L)    (0,6,R) (0,7,R) (0,8,R) (0,9,R) (0,10,R) (0,11,R) 
(1,0,L) (1,1,L) (1,2,L) (1,3,L) (1,4,L) (1,5,L)    (1,6,R) (1,7,R) (1,8,R) (1,9,R) (1,10,R) (1,11,R)
(2,0,L) (2,1,L) (2,2,L) (2,3,L) (2,4,L) (2,5,L)    (2,6,R) (2,7,R) (2,8,R) (2,9,R) (2,10,R) (2,11,R)
                (3,2,L) (3,3,L) (3,4,L) (3,5,L)    (3,6,R) (3,7,R) (3,8,R) (3,9,R)
"""

[[layer]]
name = "base"
keys = """
LT(2, Escape)    Q          W          E           R           T                Y               U               I           O          P            Backspace
Tab              A          S          D           F           G                H               J               K           L          Semicolon    Quote
LShift           Z          X          C           V           B                B               N               M           Comma      Slash        RShift
                            LGui     LAlt   LT(1, Backspace)   Space            LT(2, Enter)    RAlt            RCtrl       TG(3)
"""
[[layer]]
name = "Dot1"
keys = """
Backspace    Kc1        Kc2        Kc3         Kc4         Kc5          Y           U           I           LeftBracket    RightBracket    Backslash
Enter        Kc6        Kc7        Kc8         Kc9         Kc0          Left        Down        Up          Right          Semicolon       _
Delete       Minus      Equal      Comma       Dot         Slash        B           N           M           Comma          Slash           _
                        _          _           _           _            _           _           _           _       
"""

[[layer]]
name = "F2"
keys = """
_            F1        F2        F3         F4             F5             PageUp      PageDown    _           LeftBracket    RightBracket    Backslash
LCtrl        F6        F7        F8         F9             F10            Left        Down        Up          Right          _               _
LShift       F11       F12       F13        F14            F15            Delete      Insert      Home        End            _               _
                       _          _           _           _            _           _           _           _       
"""

[[layer]]
name = "number"
keys = """
MediaNextTrack   User0     User1     User2      AudioVolUp     BrightnessUp     Kp7         Kp8         Kp9         KpPlus    KpMinus     Backspace
MediaPrevTrack   F6        F7        F8         AudioVolDown   BrightnessDown   Kp4         Kp5         Kp6         KpComma   KpAsterisk  TG(4)
MediaStop        F11       F12       F13        F14            _                Kp1         Kp2         Kp3         KpEqual   KpSlash     Calculator
                           _          _           _            _                KpEnter     Kp0         KpDot       _
"""

[[layer]]
name = "game"
keys = """
Escape           Q          W          E           R           T                Y               U               I           O          P            Backspace
Tab              A          S          D           F           G                H               J               K           L          Semicolon    _
LShift           Z          X          C           V           B                B               N               M           Comma      Slash        RShift
                            LCtrl     LAlt         LShift      Space            Enter           RAlt            RCtrl       CapsLock
"""

[host]
vial_enabled = true
unlock_keys = [[0, 0], [0, 1],[2,0]]

[split.central]
rows = 4
cols = 6
row_offset = 0
col_offset = 0

[split.central.matrix]
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P0_31","P0_29","P0_02","P1_15","P1_13","P1_11",]

[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 6

[split.peripheral.matrix]
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P1_11","P1_13","P1_15","P0_02","P0_29","P0_31",]

# RMK uses col2row as the default matrix diode direction, if you want to use a row2col matrix, add `row2col = true`
# row2col = true



